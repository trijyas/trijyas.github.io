<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Trijyas</title>
    <meta name="description" content="Get in touch with Trijyas. We'd love to hear from you — reach us via email, social media, or our community channels.">
    <link rel="canonical" href="https://trijyas.in/contact/">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../files/css/base.css">
    <link rel="stylesheet" href="../files/icon/style.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TBNP2N5ZYK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-TBNP2N5ZYK');
    </script>

    <style>
        .contact-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8rem 1.5rem 4rem;
            text-align: center;
        }

        .contact-page h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 0.5rem;
        }

        .contact-page > p {
            color: var(--clr-text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        .contact-cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 700px;
            margin-bottom: 3rem;
        }

        .contact-card {
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            min-width: 260px;
            flex: 1;
            text-align: center;
            transition: all var(--duration) var(--ease);
        }

        .contact-card:hover {
            border-color: rgba(255,255,255,0.12);
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.3);
        }

        .contact-card .card-icon {
            font-size: 2rem;
            color: var(--clr-accent);
            margin-bottom: 1rem;
            display: block;
        }

        .contact-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .contact-card a {
            color: var(--clr-text-muted);
            font-size: 0.95rem;
        }

        .contact-card a:hover {
            color: var(--clr-accent);
        }

        .contact-social {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .contact-social a {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: var(--clr-surface);
            border: 1px solid var(--clr-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--clr-text-muted);
            font-size: 1.1rem;
            transition: all var(--duration) var(--ease);
        }

        .contact-social a:hover {
            background: var(--clr-accent);
            border-color: var(--clr-accent);
            color: var(--clr-bg);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <!-- ===== NAVBAR ===== -->
    <nav id="navbar" class="scrolled">
        <div class="nav-inner">
            <a href="../" class="nav-logo">
                <object type="image/svg+xml" data="../files/res/logo1.svg" aria-label="Trijyas Logo">Trijyas</object>
                <span>Trijyas</span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="../#services">Services</a></li>
                <li><a href="../#product">Product</a></li>
                <li><a href="../#about">About</a></li>
                <li><a href="./" class="nav-cta">Contact Us</a></li>
            </ul>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ===== CONTACT CONTENT ===== -->
    <main class="contact-page">
        <h1>Get in Touch</h1>
        <p>Have any questions? We'd love to hear from you.</p>

        <div class="contact-cards">
            <div class="contact-card">
                <span class="card-icon icon icon-envelope"></span>
                <h3>Email Us</h3>
                <a href="mailto:support@trijyas.in">support@trijyas.in</a>
            </div>
        </div>

        <h3 style="color: var(--clr-heading); margin-bottom: 1.2rem; font-size: 1.1rem;">Find Us On</h3>
        <div class="contact-social">
            <a href="https://www.instagram.com/trijyas.in/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><span class="icon icon-instagram"></span></a>
            <a href="https://twitter.com/trijyas_in" target="_blank" rel="noopener noreferrer" aria-label="Twitter"><span class="icon icon-twitter"></span></a>
            <a href="https://www.linkedin.com/company/trijyas" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><span class="icon icon-linkedin"></span></a>
            <a href="https://discord.gg/Kjgc2qGCrD" target="_blank" rel="noopener noreferrer" aria-label="Discord"><span class="icon icon-discord"></span></a>
            <a href="https://www.youtube.com/@trijyas_in" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><span class="icon icon-youtube"></span></a>
            <a href="https://t.me/trijyas" target="_blank" rel="noopener noreferrer" aria-label="Telegram"><span class="icon icon-telegram"></span></a>
            <a href="https://whatsapp.com/channel/0029VamRAKD4o7qMN3IGBX24" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><span class="icon icon-whatsapp"></span></a>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer id="footer">
        <div class="footer-inner">
            <div class="footer-bottom">
                <span>© 2022 – 2026 Trijyas. All rights reserved.</span>
                <div>
                    <a href="../privacy">Privacy Policy</a>
                    <a href="../terms">Terms of Service</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('active');
            navLinks.classList.toggle('open');
        });
        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navToggle.classList.remove('active');
                navLinks.classList.remove('open');
            });
        });
    </script>
</body>
</html>
